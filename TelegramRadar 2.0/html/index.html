<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Telegram Radar 2.0</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mc:#00bfff;--mc-dim:#007fa8;--mc-glow:rgba(0,191,255,.18);--mc-glow2:rgba(0,191,255,.06);
  --bg:#06060e;--bg2:#0d0d1a;--bg3:#111120;--border:#1a1a30;--border2:#22223a;
  --text:#c8cce8;--dim:#555577;--green:#00e676;--red:#ff4757;--yellow:#ffd32a;
  --radius:10px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'Cascadia Code','Fira Code','Consolas',monospace
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--mc-dim);border-radius:3px}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  pointer-events:none;z-index:9999
}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(6,6,14,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border2);
  padding:0 32px;height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:16px
}
.h-left{display:flex;align-items:center;gap:14px}
.h-logo{font-size:1.6rem;filter:drop-shadow(0 0 8px var(--mc))}
.h-title{font-size:1.15rem;font-weight:700;letter-spacing:2px;color:var(--mc);
  text-shadow:0 0 14px var(--mc);text-transform:uppercase}
.h-sub{font-size:.72rem;color:var(--dim);letter-spacing:1px;margin-top:1px}
.h-right{display:flex;align-items:center;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.h-links a{color:var(--dim);text-decoration:none;font-size:.78rem;margin-left:18px;
  transition:color .2s;letter-spacing:.5px}
.h-links a:hover{color:var(--mc)}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:40px 24px 80px}

/* DROP ZONE */
#dz{
  position:relative;border:1px solid var(--mc-dim);border-radius:14px;
  padding:70px 40px;text-align:center;cursor:pointer;
  background:var(--mc-glow2);
  transition:background .25s,border-color .25s,box-shadow .25s;overflow:hidden
}
#dz::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--mc-glow) 0%,transparent 70%);
  opacity:0;transition:opacity .3s
}
#dz:hover::before,#dz.ov::before{opacity:1}
#dz:hover,#dz.ov{border-color:var(--mc);box-shadow:0 0 30px var(--mc-glow),inset 0 0 20px var(--mc-glow2)}
.dz-icon{font-size:3.2rem;margin-bottom:16px;display:block;
  filter:drop-shadow(0 0 10px var(--mc));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.dz-title{font-size:1.1rem;color:var(--mc);font-weight:600;margin-bottom:8px;letter-spacing:.5px}
.dz-sub{color:var(--dim);font-size:.85rem;line-height:1.6}
.dz-sub b{color:var(--mc)}
.dz-fmts{display:flex;justify-content:center;gap:8px;margin-top:22px;flex-wrap:wrap}
.fmt{background:var(--bg3);border:1px solid var(--border2);color:var(--mc);
  border-radius:6px;padding:4px 12px;font-size:.75rem;font-family:var(--mono);letter-spacing:1px}
#fi{display:none}

/* VIEWER */
#viewer{display:none}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:14px;
  margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)
}
.btn-back{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:7px 14px;font-size:.83rem;cursor:pointer;
  transition:border-color .2s,color .2s;white-space:nowrap
}
.btn-back:hover{border-color:var(--mc);color:var(--mc)}
.vfname{font-family:var(--mono);font-size:.82rem;color:var(--dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vfname span{color:var(--mc)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.sc{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);
  padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s
}
.sc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--mc),transparent);
  opacity:0;transition:opacity .3s
}
.sc:hover{border-color:var(--mc-dim)}
.sc:hover::after{opacity:1}
.sc-label{color:var(--dim);font-size:.73rem;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.sc-value{color:var(--mc);font-size:1.7rem;font-weight:800;font-family:var(--mono);line-height:1}

/* SECTION TITLE */
.stitle{
  color:var(--mc);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:600;margin:28px 0 12px;display:flex;align-items:center;gap:8px
}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:200px;position:relative}
.sw::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:.85rem;pointer-events:none}
.sw input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:9px 14px 9px 36px;font-size:.88rem;outline:none;
  transition:border-color .2s,box-shadow .2s;font-family:var(--font)
}
.sw input:focus{border-color:var(--mc);box-shadow:0 0 0 3px var(--mc-glow)}
.sw input::placeholder{color:var(--dim)}
.badge{
  background:var(--bg3);border:1px solid var(--border2);color:var(--dim);
  border-radius:8px;padding:9px 14px;font-size:.8rem;white-space:nowrap;font-family:var(--mono)
}
.badge b{color:var(--mc)}
.btn-ex{
  background:transparent;border:1px solid var(--mc-dim);color:var(--mc);
  border-radius:8px;padding:9px 16px;font-size:.8rem;cursor:pointer;
  transition:background .2s,box-shadow .2s;white-space:nowrap
}
.btn-ex:hover{background:var(--mc-glow);box-shadow:0 0 12px var(--mc-glow)}

/* TABLE */
.tw{border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead tr{background:var(--bg3)}
th{
  padding:11px 14px;text-align:left;color:var(--mc);font-weight:600;
  font-family:var(--mono);font-size:.75rem;letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;
  user-select:none;transition:background .15s
}
th:hover{background:var(--mc-glow2)}
th .arr{color:var(--dim);margin-left:4px;font-size:.7rem}
td{
  padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:top;
  font-family:var(--mono);color:var(--text);max-width:420px;overflow:hidden;
  text-overflow:ellipsis;white-space:pre-wrap;word-break:break-word
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--mc-glow2)}
.tn{color:var(--mc);width:50px;text-align:right}
.td{color:var(--yellow);white-space:nowrap}
.ti{color:var(--mc-dim)}

/* PAGINATION */
.pg{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;flex-wrap:wrap}
.pb{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:6px;padding:5px 11px;font-size:.78rem;cursor:pointer;
  transition:border-color .2s,color .2s;font-family:var(--mono)
}
.pb:hover,.pb.act{border-color:var(--mc);color:var(--mc)}
.pb:disabled{opacity:.3;cursor:default}

/* HTML frame */
.hframe{width:100%;height:78vh;border:1px solid var(--border2);border-radius:var(--radius);background:#fff}

/* FOOTER */
footer{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(6,6,14,.95);border-top:1px solid var(--border);
  padding:10px 28px;display:flex;align-items:center;justify-content:space-between;
  font-size:.75rem;color:var(--dim);z-index:50
}
footer a{color:var(--mc);text-decoration:none}
.fr{display:flex;gap:20px}

/* TOAST */
#toast{
  position:fixed;bottom:56px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--mc);color:var(--mc);
  padding:10px 22px;border-radius:8px;font-size:.82rem;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  z-index:9998;box-shadow:0 0 20px var(--mc-glow);font-family:var(--mono)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  header{padding:0 16px}
  .h-links{display:none}
  .page{padding:24px 14px 70px}
  #dz{padding:40px 20px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <span class="h-logo">📡</span>
    <div>
      <div class="h-title">Telegram Radar 2.0</div>
      <div class="h-sub">Report Viewer</div>
    </div>
  </div>
  <div class="h-right">
    <div class="dot" title="online"></div>
    <div class="h-links">
      <a href="https://t.me/adaptBlackSerch" target="_blank">t.me/adaptBlackSerch</a>
      <a href="https://github.com/mark-smitov" target="_blank">GitHub</a>
    </div>
  </div>
</header>

<main class="page">
  <div id="dz" onclick="document.getElementById('fi').click()">
    <span class="dz-icon">🗂️</span>
    <div class="dz-title">Перетащите файл отчёта сюда</div>
    <div class="dz-sub">или <b>нажмите</b> для выбора</div>
    <div class="dz-fmts">
      <span class="fmt">JSON</span>
      <span class="fmt">CSV</span>
      <span class="fmt">TXT</span>
      <span class="fmt">HTML</span>
    </div>
    <input type="file" id="fi" accept=".html,.json,.txt,.csv"/>
  </div>
  <div id="viewer"></div>
</main>

<footer>
  <span>Telegram Radar 2.0 — @vksmitov</span>
  <div class="fr">
    <a href="https://t.me/adaptBlackSerch" target="_blank">Channel</a>
    <a href="https://github.com/mark-smitov" target="_blank">GitHub</a>
  </div>
</footer>
<div id="toast"></div>

<script>
const PAGE=200;
let D=[],F=[],H=[],pg=1,sCol=-1,sAsc=true;

const dz=document.getElementById('dz'),fi=document.getElementById('fi'),vw=document.getElementById('viewer');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('ov')});
dz.addEventListener('dragleave',()=>dz.classList.remove('ov'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('ov');e.dataTransfer.files[0]&&go(e.dataTransfer.files[0])});
fi.addEventListener('change',()=>fi.files[0]&&go(fi.files[0]));

function go(file){
  const r=new FileReader();
  r.onload=e=>{
    const t=e.target.result,ext=file.name.split('.').pop().toLowerCase();
    dz.style.display='none';vw.style.display='block';
    if(ext==='json') rJSON(t,file.name);
    else if(ext==='csv') rCSV(t,file.name);
    else if(ext==='html') rHTML(t,file.name);
    else rTXT(t,file.name);
  };
  r.readAsText(file,'utf-8');
}

function back(){vw.style.display='none';vw.innerHTML='';dz.style.display='block';fi.value='';D=F=[];pg=1;sCol=-1;sAsc=true}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function topbar(n,ext){
  return`<div class="topbar">
    <button class="btn-back" onclick="back()">← Назад</button>
    <div class="vfname"><span>${esc(n)}</span></div>
    <div style="margin-left:auto;color:var(--dim);font-size:.75rem;font-family:var(--mono)">${ext.toUpperCase()}</div>
  </div>`
}

function stats(items){
  return`<div class="stats-row">${items.map(([l,v])=>`<div class="sc"><div class="sc-label">${l}</div><div class="sc-value">${v}</div></div>`).join('')}</div>`
}

function toolbar(n){
  return`<div class="toolbar">
    <div class="sw"><input id="si" placeholder="Поиск по содержимому…" oninput="search()"/></div>
    <div class="badge" id="cb"><b>${n}</b> записей</div>
    <button class="btn-ex" onclick="expCSV()">↓ CSV</button>
  </div>`
}

function rows(){
  if(!F.length)return`<tr><td colspan="${H.length}" style="text-align:center;color:var(--dim);padding:32px">Нет результатов</td></tr>`;
  return F.slice((pg-1)*PAGE,pg*PAGE).map(row=>`<tr>${H.map((h,i)=>{
    const v=esc(row[h]??'');
    let c='';
    if(i===0&&/^\d+$/.test(String(row[h]??'')))c='tn';
    else if(h.toLowerCase().includes('date')||h.toLowerCase().includes('дата'))c='td';
    else if(h.toLowerCase().includes('id'))c='ti';
    return`<td class="${c}">${v}</td>`
  }).join('')}</tr>`).join('')
}

function tbl(){
  const heads=H.map((h,i)=>{
    const a=sCol===i?(sAsc?'↑':'↓'):'↕';
    return`<th onclick="sort(${i})">${esc(h)} <span class="arr">${a}</span></th>`
  }).join('');
  return`<div class="tw"><table><thead><tr>${heads}</tr></thead><tbody id="tb">${rows()}</tbody></table></div><div class="pg" id="pag"></div>`
}

function upd(){
  const b=document.getElementById('tb');if(b)b.innerHTML=rows();
  buildPg();
  const cb=document.getElementById('cb');if(cb)cb.innerHTML=`<b>${F.length}</b> записей`
}

function buildPg(){
  const p=document.getElementById('pag');if(!p)return;
  const tot=Math.ceil(F.length/PAGE);if(tot<=1){p.innerHTML='';return}
  let h=`<button class="pb" onclick="gp(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
  const s=Math.max(1,pg-2),e=Math.min(tot,pg+2);
  if(s>1)h+=`<button class="pb" onclick="gp(1)">1</button>${s>2?'<span style="color:var(--dim)">…</span>':''}`;
  for(let i=s;i<=e;i++)h+=`<button class="pb ${i===pg?'act':''}" onclick="gp(${i})">${i}</button>`;
  if(e<tot)h+=`${e<tot-1?'<span style="color:var(--dim)">…</span>':''}<button class="pb" onclick="gp(${tot})">${tot}</button>`;
  h+=`<button class="pb" onclick="gp(${pg+1})" ${pg===tot?'disabled':''}>›</button>`;
  p.innerHTML=h
}

function gp(n){const t=Math.ceil(F.length/PAGE);pg=Math.max(1,Math.min(n,t));upd();vw.scrollIntoView({behavior:'smooth'})}

function sort(c){
  if(sCol===c)sAsc=!sAsc;else{sCol=c;sAsc=true}
  const h=H[c];
  F.sort((a,b)=>{
    const av=a[h]??'',bv=b[h]??'',an=Number(av),bn=Number(bv);
    if(!isNaN(an)&&!isNaN(bn))return sAsc?an-bn:bn-an;
    return sAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av))
  });
  pg=1;
  vw.querySelectorAll('th').forEach((th,i)=>{const a=th.querySelector('.arr');if(a)a.textContent=sCol===i?(sAsc?'↑':'↓'):'↕'});
  upd()
}

function search(){
  const q=(document.getElementById('si')?.value||'').toLowerCase();
  F=q?D.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q))):[...D];
  pg=1;sCol=-1;sAsc=true;upd()
}

function expCSV(){
  if(!F.length)return;
  const h=H.join(','),rs=F.map(r=>H.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','));
  const b=new Blob([[h,...rs].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='export.csv';a.click();
  toast('✓ CSV сохранён')
}

function toast(msg,dur=2400){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur)
}

/* RENDERERS */
function rJSON(text,name){
  let raw;try{raw=JSON.parse(text)}catch(e){vw.innerHTML=`<div style="text-align:center;padding:60px;color:var(--red)">⚠️ JSON error: ${e}</div>`;return}
  if(!Array.isArray(raw))raw=[raw];
  D=[...raw];F=[...raw];H=raw.length?Object.keys(raw[0]):[];pg=1;sCol=-1;sAsc=true;
  const wm=raw.filter(m=>m.media||m.has_media).length;
  const sn=new Set(raw.map(m=>m.sender_id||m.from_id).filter(Boolean)).size;
  const dr=raw.length?`${(raw[0].date||'—').slice(0,10)} → ${(raw[raw.length-1].date||'—').slice(0,10)}`:'—';
  vw.innerHTML=topbar(name,'json')+stats([['Записей',raw.length],['С медиа',wm],['Отправители',sn],['Период',dr]])
    +`<div class="stitle">Данные</div>`+toolbar(raw.length)+tbl();
  buildPg()
}

function rCSV(text,name){
  const lines=text.trim().split('\n').filter(Boolean);
  const headers=csvLine(lines[0]);
  const rows=lines.slice(1).map(l=>{const v=csvLine(l),o={};headers.forEach((h,i)=>o[h.trim()]=(v[i]||'').trim());return o});
  D=[...rows];F=[...rows];H=headers.map(h=>h.trim());pg=1;sCol=-1;sAsc=true;
  vw.innerHTML=topbar(name,'csv')+stats([['Строк',rows.length],['Колонок',headers.length]])
    +`<div class="stitle">Таблица</div>`+toolbar(rows.length)+tbl();
  buildPg()
}

function csvLine(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c=''}else c+=ch}
  r.push(c);return r
}

function rTXT(text,name){
  const ls=text.split('\n');
  D=ls.map((l,i)=>({'#':i+1,'Строка':l}));F=[...D];H=['#','Строка'];pg=1;sCol=-1;sAsc=true;
  vw.innerHTML=topbar(name,'txt')+stats([['Строк',ls.length],['Символов',text.length]])
    +`<div class="stitle">Содержимое</div>`+toolbar(ls.length)+tbl();
  buildPg()
}

function rHTML(text,name){
  const blob=new Blob([text],{type:'text/html'}),url=URL.createObjectURL(blob);
  vw.innerHTML=topbar(name,'html')+`<div class="stitle">Предпросмотр</div><iframe src="${url}" class="hframe" title="Preview"></iframe>`
}
</script>
</body>
</html>
